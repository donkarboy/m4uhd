<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }

        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; gap: 16px; z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #222;
            border-top-color: #58a6ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader-title { color: #ccc; font-size: 14px; letter-spacing: 0.05em; }
        #status       { color: #555; font-size: 12px; }

        /* step list */
        #steps { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; min-width: 260px; }
        .step-row { display: flex; align-items: center; gap: 10px; }
        .step-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid #333; background: #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #555; flex-shrink: 0; transition: all .2s;
        }
        .step-dot.active { border-color: #58a6ff; color: #58a6ff; background: #0d2240; }
        .step-dot.done   { border-color: #3fb950; color: #3fb950; background: #0a1f10; }
        .step-dot.error  { border-color: #e74c3c; color: #e74c3c; background: #200a0a; }
        .step-text { font-size: 12px; color: #555; transition: color .2s; }
        .step-text.active { color: #aaa; }
        .step-text.done   { color: #3fb950; }
        .step-text.error  { color: #e74c3c; }

        /* server picker (shown when multiple servers available) */
        #server-picker {
            display: none; position: fixed; inset: 0; background: #000;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; z-index: 9; padding: 24px;
        }
        #server-picker h2 { color: #e6edf3; font-size: 16px; font-weight: 500; }
        #server-picker p  { color: #555; font-size: 12px; }
        #server-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 4px; }
        .srv-btn {
            padding: 9px 20px; border: 1px solid #30363d; border-radius: 6px;
            background: #161b22; color: #e6edf3; font-size: 13px; cursor: pointer;
            transition: border-color .15s, background .15s;
        }
        .srv-btn:hover { border-color: #58a6ff; background: #0d2240; }

        /* episode picker */
        #ep-picker {
            display: none; position: fixed; inset: 0; background: #000;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; z-index: 8; padding: 24px;
        }
        #ep-picker h2 { color: #e6edf3; font-size: 16px; font-weight: 500; }
        #ep-picker p  { color: #555; font-size: 12px; }
        #ep-select {
            background: #161b22; border: 1px solid #30363d; border-radius: 6px;
            padding: 8px 14px; color: #e6edf3; font-size: 13px; outline: none;
            min-width: 200px;
        }
        #ep-go {
            padding: 8px 24px; background: #58a6ff; color: #000;
            border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        #ep-go:hover { opacity: .88; }

        /* error */
        #error-box {
            display: none; position: fixed; inset: 0;
            flex-direction: column; align-items: center; justify-content: center;
            background: #0d0d0d; gap: 12px; padding: 24px; text-align: center; z-index: 20;
        }
        #error-box h2 { color: #e74c3c; font-size: 18px; }
        #error-box p  { color: #888; font-size: 13px; max-width: 500px; line-height: 1.6; word-break: break-all; }
        #retry-btn {
            padding: 8px 20px; background: #58a6ff; color: #000;
            border: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 4px;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-title">Loading player…</p>
    <span id="status"></span>
    <div id="steps">
        <div class="step-row" id="s1"><div class="step-dot" id="d1">1</div><span class="step-text" id="t1">Fetch watch page</span></div>
        <div class="step-row" id="s2"><div class="step-dot" id="d2">2</div><span class="step-text" id="t2">Get server list</span></div>
        <div class="step-row" id="s3"><div class="step-dot" id="d3">3</div><span class="step-text" id="t3">Resolve embed URL</span></div>
        <div class="step-row" id="s4"><div class="step-dot" id="d4">4</div><span class="step-text" id="t4">Launch player</span></div>
    </div>
</div>

<div id="server-picker">
    <h2>Choose Server</h2>
    <p>Multiple servers available — pick one to play</p>
    <div id="server-list"></div>
</div>

<div id="ep-picker">
    <h2>Choose Episode</h2>
    <p id="ep-count"></p>
    <select id="ep-select"></select>
    <button id="ep-go">Play</button>
</div>

<div id="error-box">
    <h2>Playback Error</h2>
    <p id="error-msg">Could not load the video.</p>
    <p id="error-detail" style="font-size:11px;color:#555;margin-top:8px;"></p>
    <button id="retry-btn" onclick="location.reload()">Retry</button>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────
const loader       = document.getElementById("loader");
const statusEl     = document.getElementById("status");
const errorBox     = document.getElementById("error-box");
const serverPicker = document.getElementById("server-picker");
const serverList   = document.getElementById("server-list");
const epPicker     = document.getElementById("ep-picker");
const epSelect     = document.getElementById("ep-select");

// ── step helpers ─────────────────────────────────────────────────
function step(n, state, text) {
    const dot = document.getElementById("d" + n);
    const txt = document.getElementById("t" + n);
    dot.className = "step-dot " + state;
    txt.className = "step-text " + state;
    if (text) txt.textContent = text;
    dot.textContent = state === "done" ? "✓" : state === "error" ? "✕" : String(n);
}
function log(msg) { statusEl.textContent = msg; }
function showError(msg, detail) {
    loader.style.display       = "none";
    serverPicker.style.display = "none";
    epPicker.style.display     = "none";
    errorBox.style.display     = "flex";
    document.getElementById("error-msg").textContent    = msg;
    document.getElementById("error-detail").textContent = detail || "";
}

// ── CORS proxy list (corsproxy.io first) ─────────────────────────
const PROXIES = [
    u => `https://proxy.cors.sh/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

async function proxyFetch(url, opts = {}) {
    for (let i = 0; i < PROXIES.length; i++) {
        try {
            log(`Proxy ${i + 1}/${PROXIES.length}…`);
            const r = await fetch(PROXIES[i](url), {
                ...opts,
                signal: AbortSignal.timeout(12000),
            });
            if (!r.ok) continue;
            const text = await r.text();
            if (text.length > 200) return text;
        } catch (_) {}
    }
    throw new Error("All proxies failed — check your connection and try again.");
}

async function proxyPost(url, data, referer) {
    const body = new URLSearchParams(data).toString();
    const opts = {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-Requested-With": "XMLHttpRequest",
            "Referer": referer,
        },
        body,
    };
    for (let i = 0; i < PROXIES.length; i++) {
        try {
            log(`Proxy ${i + 1}/${PROXIES.length}…`);
            const r = await fetch(PROXIES[i](url), {
                ...opts,
                signal: AbortSignal.timeout(12000),
            });
            if (!r.ok) continue;
            const text = await r.text();
            if (text.length > 10) return text;
        } catch (_) {}
    }
    throw new Error("POST via proxy failed.");
}

// ── parsers ──────────────────────────────────────────────────────
function parseCSRF(html) {
    const m = html.match(/<meta name="csrf-token" content="([^"]+)"/);
    return m ? m[1] : "";
}

function parseEpisodeIds(html) {
    return [...html.matchAll(/idepisode=["'](\w+)["'][^>]*>([^<]*)/g)]
        .map(m => ({ id: m[1], label: m[2].trim() || m[1] }));
}

function parseServerSpans(html) {
    const re = /<span[^>]+data="([^"]{10,})"[^>]*>([\s\S]*?)<\/span>/g;
    const out = [];
    for (const m of html.matchAll(re)) {
        const label = m[2].replace(/<[^>]+>/g, "").trim() || "Server";
        out.push({ label, data: m[1] });
    }
    return out;
}

function parseIframe(html) {
    const m = html.match(/<iframe[^>]+src="([^"]+)"/i);
    return m ? m[1] : "";
}

function getRoot(url) {
    const p = new URL(url); return `${p.protocol}//${p.host}`;
}

// ── play embed in fullscreen iframe ──────────────────────────────
function playEmbed(src) {
    step(4, "active", "Launching player…");
    const iframe = document.createElement("iframe");
    iframe.src             = src;
    iframe.allowFullscreen = true;
    iframe.referrerPolicy  = "no-referrer";
    iframe.allow           = "fullscreen; encrypted-media; picture-in-picture; autoplay";
    iframe.sandbox         = "allow-scripts allow-same-origin allow-forms allow-popups allow-presentation";
    iframe.style.cssText   = "position:fixed;inset:0;width:100%;height:100%;border:none;z-index:5;";
    iframe.onload          = () => { loader.style.display = "none"; };
    document.body.appendChild(iframe);
    setTimeout(() => { loader.style.display = "none"; }, 6000);
    step(4, "done", "Player loaded");
}

// ── auto-pick best server: prefer #H (abyss) then #M then first ──
function bestServer(servers) {
    const order = ["#h", "#m", "#backup"];
    for (const pref of order) {
        const s = servers.find(s => s.label.toLowerCase().includes(pref));
        if (s) return s;
    }
    return servers[0];
}

// ── resolve servers → pick one → play ────────────────────────────
async function resolveAndPlay(servers, token, rootUrl, m4uUrl) {
    step(3, "active", `Resolving ${servers.length} server(s)…`);

    // Fetch all embed URLs in parallel
    const resolved = await Promise.all(servers.map(async srv => {
        try {
            const html = await proxyPost(`${rootUrl}/ajax`, { m4u: srv.data, _token: token }, m4uUrl);
            const src  = parseIframe(html);
            return { ...srv, src };
        } catch (_) {
            return { ...srv, src: "" };
        }
    }));

    const valid = resolved.filter(s => s.src);
    if (!valid.length) throw new Error("No embed URLs could be resolved from any server.");

    step(3, "done", `${valid.length} embed URL(s) found`);

    // If only one valid server, play immediately
    if (valid.length === 1) {
        playEmbed(valid[0].src);
        return;
    }

    // Auto-pick best server and play — show picker only as fallback
    const best = bestServer(valid);
    if (best && best.src) {
        playEmbed(best.src);
        // Show a subtle server picker underneath for user to switch
        showServerPicker(valid, /* autoplayed */ best.label);
        return;
    }

    showServerPicker(valid, null);
}

function showServerPicker(servers, autoLabel) {
    serverList.innerHTML = "";
    servers.forEach(srv => {
        const btn = document.createElement("button");
        btn.className   = "srv-btn";
        btn.textContent = srv.label + (srv.label === autoLabel ? " ▶" : "");
        btn.onclick     = () => {
            serverPicker.style.display = "none";
            // remove existing iframe
            const old = document.querySelector("iframe");
            if (old) old.remove();
            loader.style.display = "flex";
            step(4, "", "Launch player");
            playEmbed(srv.src);
        };
        serverList.appendChild(btn);
    });
    // Only show the picker if no auto-play happened yet
    if (!autoLabel) {
        serverPicker.style.display = "flex";
        loader.style.display       = "none";
    }
}

// ── episode flow ──────────────────────────────────────────────────
let _token = "", _rootUrl = "", _m4uUrl = "";

async function runEpisode(epId) {
    epPicker.style.display = "none";
    loader.style.display   = "flex";
    step(2, "active", `POST /ajaxtv  ep=${epId}`);

    const html = await proxyPost(`${_rootUrl}/ajaxtv`, { idepisode: epId, _token }, _m4uUrl);
    const servers = parseServerSpans(html);
    if (!servers.length) throw new Error("No servers returned for this episode.");
    step(2, "done", `Servers: ${servers.map(s => s.label).join(", ")}`);
    await resolveAndPlay(servers, _token, _rootUrl, _m4uUrl);
}

// ── main ─────────────────────────────────────────────────────────
async function init() {
    // Extract the m4uhd URL from the path
    // e.g. /m4uhd/https://ww1.m4uhd.page/watch-movie-...
    const full = window.location.pathname + window.location.search;
    const m = full.match(/(https?:\/\/[^\s]+)/);
    if (!m) {
        showError(
            "No URL found in path.",
            "Use: https://donkarboy.github.io/m4uhd/https://ww1.m4uhd.page/watch-movie-..."
        );
        return;
    }

    const m4uUrl  = decodeURIComponent(m[1]);
    _m4uUrl       = m4uUrl;
    _rootUrl      = getRoot(m4uUrl);
    const isMovie = m4uUrl.includes("/watch-movie-");

    try {
        // ── Step 1: fetch the watch page ───────────────────────
        step(1, "active", "Fetching " + m4uUrl.split("/").pop());
        const html = await proxyFetch(m4uUrl);
        _token = parseCSRF(html);
        if (!_token) throw new Error("CSRF token not found — page may have changed.");
        step(1, "done", `Token: ${_token.slice(0, 14)}…`);

        // ── Step 2: get servers ────────────────────────────────
        step(2, "active", isMovie ? "Parsing server buttons…" : "Finding episodes…");

        if (isMovie) {
            const servers = parseServerSpans(html);
            if (!servers.length) throw new Error("No server buttons found on movie page.");
            step(2, "done", `Servers: ${servers.map(s => s.label).join(", ")}`);
            await resolveAndPlay(servers, _token, _rootUrl, m4uUrl);

        } else {
            // TV: pick episode
            const epIds = parseEpisodeIds(html);
            if (!epIds.length) throw new Error("No episode IDs found on page.");
            step(2, "done", `${epIds.length} episodes found`);

            // Check if URL specifies an episode  e.g. ?ep=S1-E4 or ?ep=2
            const epParam = new URLSearchParams(window.location.search).get("ep");
            let chosen = null;
            if (epParam) {
                chosen = epIds.find(e => e.label.toLowerCase().includes(epParam.toLowerCase())) || epIds[0];
            }

            if (chosen) {
                await runEpisode(chosen.id);
            } else {
                // Show episode picker
                epSelect.innerHTML = epIds.map((e, i) =>
                    `<option value="${e.id}">${e.label || e.id}</option>`
                ).join("");
                document.getElementById("ep-count").textContent =
                    `${epIds.length} episodes available`;
                epPicker.style.display = "flex";
                loader.style.display   = "none";

                document.getElementById("ep-go").onclick = async () => {
                    const selId = epSelect.value;
                    loader.style.display = "flex";
                    step(2, "", "Get server list");
                    step(3, "", "Resolve embed URL");
                    step(4, "", "Launch player");
                    try { await runEpisode(selId); }
                    catch (e) { showError(e.message); }
                };
            }
        }

    } catch (e) {
        step(1, "error"); showError(e.message);
    }
}

init();
</script>
</body>
</html>
