<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }

        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; gap: 20px; z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #222;
            border-top-color: #58a6ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p  { color: #aaa; font-size: 14px; letter-spacing: 0.05em; }
        #status    { color: #555; font-size: 12px; margin-top: 4px; }

        #error-box {
            position: fixed; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: #0d0d0d;
            gap: 12px; padding: 24px; text-align: center;
        }
        #error-box h2  { color: #e74c3c; font-size: 18px; }
        #error-box p   { color: #888; font-size: 13px; max-width: 500px; line-height: 1.6; word-break: break-all; }
        #retry-btn {
            margin-top: 8px; padding: 8px 20px; background: #58a6ff; color: #000;
            border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        #retry-btn:hover { opacity: .85; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Loading player…</p>
    <span id="status"></span>
</div>

<div id="error-box">
    <h2>Playback Error</h2>
    <p id="error-msg">Could not load the video.</p>
    <p id="error-detail" style="font-size:11px;color:#555;margin-top:8px;"></p>
    <button id="retry-btn" onclick="init()">Retry</button>
</div>

<script>
const loader   = document.getElementById("loader");
const statusEl = document.getElementById("status");
const errorBox = document.getElementById("error-box");
const errorMsg = document.getElementById("error-msg");
const errorDet = document.getElementById("error-detail");

function log(msg) { statusEl.textContent = msg; }

function showError(msg, detail = "") {
    loader.style.display   = "none";
    errorBox.style.display = "flex";
    errorMsg.textContent   = msg;
    errorDet.textContent   = detail;
}

function resetUI() {
    loader.style.display   = "flex";
    errorBox.style.display = "none";
    statusEl.textContent   = "";
    // remove any old iframe
    const old = document.getElementById("player-frame");
    if (old) old.remove();
}

// ── proxy list (corsproxy.io first) ──────────────────────────────
const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchViaProxy(url) {
    for (let i = 0; i < PROXIES.length; i++) {
        try {
            log(`Fetching via proxy ${i + 1} of ${PROXIES.length}…`);
            const res = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(10000) });
            if (!res.ok) continue;
            const text = await res.text();
            if (text.length > 100) return text;   // sanity: real page
        } catch (_) {}
    }
    throw new Error("All proxies failed. Check your network or try again.");
}

// ── extract vid param from abyssplayer page ───────────────────────
function extractAbyssVid(html) {
    // abyssplayer.com/?v=<vid>  — page JS or meta usually has it again
    const patterns = [
        /\?v=([A-Za-z0-9_\-]{4,})/,
        /vid['":\s=]+['"]([A-Za-z0-9_\-]{4,})['"]/i,
        /source['":\s]+['"]([^'"]{10,})['"]/i,
        /file['":\s]+['"]([^'"]{10,})['"]/i,
        /(https?:\/\/[^\s'"<>]+\.m3u8[^\s'"<>]*)/,
    ];
    for (const re of patterns) {
        const m = html.match(re);
        if (m) return m[1];
    }
    return null;
}

// ── play a URL in a fullscreen iframe ────────────────────────────
function playInIframe(src) {
    log("Launching player…");
    const iframe = document.createElement("iframe");
    iframe.id             = "player-frame";
    iframe.src            = src;
    iframe.allowFullscreen = true;
    iframe.referrerPolicy = "no-referrer";
    iframe.allow          = "fullscreen; encrypted-media; picture-in-picture; autoplay";
    iframe.style.cssText  = "position:fixed;inset:0;width:100%;height:100%;border:none;z-index:5;";
    // sandbox kept permissive so the player's own JS can run
    iframe.sandbox        = "allow-scripts allow-same-origin allow-forms allow-popups allow-presentation";

    iframe.onload = () => { loader.style.display = "none"; };
    document.body.appendChild(iframe);

    // fallback hide loader after 6s in case onload never fires (cross-origin)
    setTimeout(() => { loader.style.display = "none"; }, 6000);
}

// ── main ─────────────────────────────────────────────────────────
async function init() {
    resetUI();

    // Accept embed URL via:
    //   ?v=<vid>            → build abyssplayer URL ourselves
    //   ?embed=<full-url>   → use that URL directly
    //   ?url=<full-url>     → same
    //   bare ?<full-url>    → treat whole search string as URL (for easy linking)
    const params = new URLSearchParams(window.location.search);

    let embedUrl = params.get("embed") || params.get("url") || null;

    // ?v=<vid>  → construct the abyssplayer URL
    if (!embedUrl && params.get("v")) {
        embedUrl = `https://abyssplayer.com/?v=${params.get("v")}`;
    }

    // fallback: bare hash  #https://abyssplayer.com/?v=xxx
    if (!embedUrl && window.location.hash.startsWith("#http")) {
        embedUrl = decodeURIComponent(window.location.hash.slice(1));
    }

    if (!embedUrl) {
        showError(
            "No embed URL provided.",
            "Use ?v=<vid>  or  ?embed=<abyssplayer-url>  or  ?url=<abyssplayer-url>"
        );
        return;
    }

    // If the URL is already a direct abyssplayer.com URL we can iframe it right away.
    // abyssplayer.com allows iframing, so try directly first to save a proxy round-trip.
    if (embedUrl.includes("abyssplayer.com")) {
        log("Loading AbyssPlayer…");
        playInIframe(embedUrl);
        return;
    }

    // Otherwise it might be a wrapper/redirect page — fetch + extract the real URL.
    try {
        log("Fetching embed page…");
        const html = await fetchViaProxy(embedUrl);

        // Look for an abyssplayer URL inside the fetched HTML
        const abyssMatch = html.match(/https?:\/\/abyssplayer\.com\/\?v=[A-Za-z0-9_\-]+/);
        if (abyssMatch) {
            log("Found AbyssPlayer URL…");
            playInIframe(abyssMatch[1] || abyssMatch[0]);
            return;
        }

        // Look for any m3u8 or direct stream
        const m3u8 = html.match(/(https?:\/\/[^\s'"<>]+\.m3u8[^\s'"<>]*)/);
        if (m3u8) {
            // Can't iframe an m3u8 directly without a player — surface it
            showError(
                "Direct HLS stream found (no built-in player).",
                m3u8[1]
            );
            return;
        }

        // Look for any iframe src in the fetched page
        const iframeSrc = html.match(/<iframe[^>]+src=['"]([^'"]+)['"]/i);
        if (iframeSrc) {
            log("Found nested iframe…");
            playInIframe(iframeSrc[1]);
            return;
        }

        showError("Could not find a playable URL in the embed page.");
    } catch (err) {
        showError(err.message);
    }
}

init();
</script>
</body>
</html>
